<title>오늘</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#6aacf0;--accent-l:#eef6ff;--accent-b:#c0dcf8;
  --text:#1a1a18;--muted:#9a9a92;
  --surface:#ffffff;--alt:#f6f6f3;
  --border:#e2e2dc;--border-l:#eeeeea;--bg:#fafaf8;
  --ok:#16a34a;--danger:#f08080;
}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  -webkit-user-select:none;user-select:none;
  padding-top:env(safe-area-inset-top);overflow-x:hidden;
}
input,select{-webkit-user-select:text;user-select:text;font-family:inherit;}
input::placeholder{color:var(--muted);opacity:.5}

/* HEADER */
.hdr{padding:16px 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;max-width:640px;margin:0 auto 12px;}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.04em;line-height:1;}
.hdr .date{margin-top:4px;font-size:14px;font-weight:400;color:var(--muted);letter-spacing:.02em;}
.btn-reset{background:var(--alt);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;align-self:flex-start;}
.btn-reset:hover{border-color:var(--danger);color:var(--danger);}

/* DAY GAUGE */
.day-gauge{max-width:640px;margin:0 auto;}
.day-labels{display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px;}
.day-track{height:7px;border-radius:4px;background:var(--border-l);overflow:hidden;}
.day-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.day-rem{text-align:center;font-size:11px;font-weight:700;margin-top:5px;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 0 8px;background:none;border:none;font-family:inherit;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
.nav-btn .ic{font-size:16px;line-height:1;letter-spacing:0;}
.nav-btn.on{color:var(--accent);}

/* PAGES */
.pages-outer{width:100vw;overflow:hidden;}
.pages-inner{display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.pg{flex:0 0 100vw;width:100vw;padding:20px 20px calc(env(safe-area-inset-bottom) + 72px);}
.pg-inner{max-width:640px;margin:0 auto;}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sec-title{font-size:15px;font-weight:700;letter-spacing:-.01em;flex:1;}
.sec-count{font-size:12px;color:var(--muted);font-weight:500;}
.sec-toggle{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:500;padding:2px 4px;}

/* INLINE ADD */
.inline-add{
  margin-top:6px;margin-bottom:4px;
  padding:10px 14px;border-radius:12px;
  background:var(--alt);border:1px solid var(--border-l);
  cursor:text;transition:border-color .15s;
}
.inline-add:focus-within{border-color:var(--accent);background:var(--surface);}
.inline-add-inp{
  width:100%;border:none;background:transparent;
  font-size:14px;font-family:inherit;color:var(--text);
  outline:none;
}

/* ITEM LIST */
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}

/* TODO ITEM */
.todo-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;background:var(--surface);border:1px solid var(--border-l);transition:background .2s,opacity .2s;touch-action:none;}
.todo-item.done{background:var(--alt);opacity:.45;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
.todo-item.dragging{opacity:.35;background:var(--alt);}

/* DRAG HANDLE */
.drag-handle{display:flex;flex-direction:column;gap:3px;padding:4px 2px;cursor:grab;flex-shrink:0;opacity:.25;transition:opacity .15s;}
.drag-handle:active{cursor:grabbing;}
.todo-item:hover .drag-handle{opacity:.5;}
.drag-handle span{display:block;width:14px;height:1.5px;background:var(--muted);border-radius:1px;}

/* CHECK BUTTON */
.chk-btn{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.chk-btn.done{background:var(--ok);border-color:var(--ok);}
.chk-btn.done::after{content:'';display:block;width:3px;height:5px;border-right:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(45deg) translate(-0.5px,-0.5px);}

.todo-text{flex:1;font-size:14px;font-weight:500;line-height:1.4;word-break:keep-all;}
.btn-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px 4px;line-height:1;opacity:.25;transition:opacity .15s;flex-shrink:0;}
.btn-del:hover{opacity:1;color:var(--danger);}

/* DONE COLLAPSE */
.done-toggle{display:flex;align-items:center;gap:6px;padding:8px 4px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-top:1px solid var(--border-l);margin-top:4px;user-select:none;}
.done-toggle .ic{transition:transform .2s;display:inline-block;font-style:normal;}
.done-toggle.open .ic{transform:rotate(90deg);}
.done-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}

/* EMPTY */
.empty-msg{padding:16px;text-align:center;color:var(--muted);font-size:13px;background:var(--alt);border-radius:10px;border:1px dashed var(--border);margin-bottom:8px;}

/* COLOR BAR */
.color-bar{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0;cursor:pointer;transition:opacity .15s;}
.color-bar:hover{opacity:.7;}

/* DIVIDER */
.divider{height:1px;background:var(--border-l);margin:20px 0;}

/* SETTINGS */
.set-card{background:var(--surface);border:1px solid var(--border-l);border-radius:14px;padding:18px 16px;margin-bottom:12px;}
.set-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;}
.set-desc{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.set-row:last-child{margin-bottom:0;}
.set-lbl{font-size:13px;color:var(--muted);font-weight:500;min-width:28px;}
.set-sel{background:var(--alt);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;color:var(--text);outline:none;cursor:pointer;}
.set-sel:focus{border-color:var(--accent);}
.set-unit{font-size:13px;color:var(--muted);}
.set-preview{font-size:12px;color:var(--accent);font-weight:600;margin-top:10px;padding:8px 12px;background:var(--accent-l);border-radius:8px;}
.preset-wrap{display:flex;gap:8px;flex-wrap:wrap;}
.btn-preset{background:var(--alt);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.btn-preset:hover{border-color:var(--accent);color:var(--accent);}
.btn-preset.active{background:var(--accent-l);border-color:var(--accent-b);color:#2563eb;}

/* CONFIRM */
.cfm-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.cfm-bd.open{display:flex;}
.cfm-box{background:var(--surface);border-radius:16px;padding:24px 20px 16px;max-width:300px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.cfm-msg{font-size:15px;font-weight:600;text-align:center;line-height:1.6;margin-bottom:20px;white-space:pre-line;}
.cfm-btns{display:flex;gap:8px;}
.cfm-cancel{flex:1;padding:11px;border:1px solid var(--border);border-radius:9px;background:var(--alt);color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.cfm-ok{flex:1;padding:11px;border:none;border-radius:9px;background:var(--danger);color:white;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}

/* TOAST */
#toast{display:none;position:fixed;top:calc(env(safe-area-inset-top,16px) + 16px);left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;color:white;z-index:999;white-space:nowrap;pointer-events:none;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>오늘</h1>
      <div class="date" id="dateEl"></div>
    </div>
    <button class="btn-reset" id="btnReset">초기화</button>
  </div>
  <div class="day-gauge">
    <div class="day-labels"><span id="dlS"></span><span id="dlM"></span><span id="dlE"></span></div>
    <div class="day-track"><div class="day-fill" id="dayFill" style="width:0%"></div></div>
    <div class="day-rem" id="dayRem"></div>
  </div>
</div>

<!-- PAGES -->
<div class="pages-outer" id="pgOuter">
  <div class="pages-inner" id="pgInner">

    <!-- PAGE 0: 할 일 -->
    <div class="pg">
      <div class="pg-inner">

        <!-- 루틴 -->
        <div class="sec-hdr">
          <span class="sec-dot" style="background:#c8c8c2;"></span>
          <span class="sec-title">루틴</span>
          <span class="sec-count" id="routineCount"></span>
        </div>
        <div class="item-list" id="routineActive"></div>
        <div id="routineDoneWrap"></div>
        <div class="inline-add" id="routineAddBox" onclick="focusInlineAdd('routine')">
          <input class="inline-add-inp" id="routineAddInp" type="text" placeholder=""
            onkeydown="if(event.key==='Enter')submitInlineAdd('routine')"
            onblur="blurInlineAdd('routine')">
        </div>

        <div class="divider"></div>

        <!-- 할 일 -->
        <div class="sec-hdr">
          <span class="sec-dot" style="background:#c8c8c2;"></span>
          <span class="sec-title">할 일</span>
          <span class="sec-count" id="taskCount"></span>
        </div>
        <div class="item-list" id="taskActive"></div>
        <div id="taskDoneWrap"></div>
        <div class="inline-add" id="taskAddBox" onclick="focusInlineAdd('task')">
          <input class="inline-add-inp" id="taskAddInp" type="text" placeholder=""
            onkeydown="if(event.key==='Enter')submitInlineAdd('task')"
            onblur="blurInlineAdd('task')">
        </div>

      </div>
    </div>

    <!-- PAGE 1: 설정 -->
    <div class="pg">
      <div class="pg-inner">

        <div class="set-card">
          <div class="set-label">하루 게이지 시간 범위</div>
          <div class="set-row">
            <span class="set-lbl">시작</span>
            <select class="set-sel" id="stSH"></select><span class="set-unit">시</span>
            <select class="set-sel" id="stSM"></select><span class="set-unit">분</span>
          </div>
          <div class="set-row">
            <span class="set-lbl">종료</span>
            <select class="set-sel" id="stEH"></select><span class="set-unit">시</span>
            <select class="set-sel" id="stEM"></select><span class="set-unit">분</span>
          </div>
          <div class="set-preview" id="setPreview"></div>
        </div>

        <div class="set-card">
          <div class="set-label">빠른 프리셋</div>
          <div class="preset-wrap">
            <button class="btn-preset" onclick="applyPreset(5,0,24,0,'기본')">기본 (5시~24시)</button>
            <button class="btn-preset" onclick="applyPreset(6,0,22,0,'저녁형')">저녁형 (6시~22시)</button>
            <button class="btn-preset" onclick="applyPreset(5,0,17,0,'아침형')">아침형 (5시~17시)</button>
            <button class="btn-preset" onclick="applyPreset(9,0,21,0,'재택')">재택 (9시~21시)</button>
          </div>
        </div>

        <div class="set-card">
          <div class="set-label">자동 초기화 시간</div>
          <div class="set-desc">설정한 시간이 되면 루틴 상태는 리셋되고, 할 일은 삭제됩니다. 루틴 항목 자체는 유지됩니다.</div>
          <div class="set-row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;">
              <input type="checkbox" id="arEnabled" style="width:16px;height:16px;cursor:pointer;" onchange="saveAutoReset()">
              자동 초기화 사용
            </label>
          </div>
          <div id="arTimeRow" class="set-row" style="display:none;">
            <span class="set-lbl">시간</span>
            <select class="set-sel" id="arH" onchange="saveAutoReset()"></select><span class="set-unit">시</span>
            <select class="set-sel" id="arM" onchange="saveAutoReset()"></select><span class="set-unit">분</span>
          </div>
          <div id="arPreview" style="font-size:12px;color:var(--accent);font-weight:600;margin-top:8px;"></div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn on" id="nb0" onclick="goPage(0)"><span class="ic">◎</span>오늘</button>
  <button class="nav-btn"    id="nb1" onclick="goPage(1)"><span class="ic">···</span>설정</button>
</nav>

<!-- CONFIRM -->
<div class="cfm-bd" id="cfmBd">
  <div class="cfm-box">
    <div class="cfm-msg" id="cfmMsg"></div>
    <div class="cfm-btns">
      <button class="cfm-cancel" id="cfmCancel">취소</button>
      <button class="cfm-ok" id="cfmOk">확인</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const STATUS={BEFORE:'진행전',DONE:'완료'};
const DEFAULT_ROUTINES=['침실 정리 & 물 마시기','매달리기','샤워','환기','손풀기'];
const DS_KEY='dm_ds', AR_KEY='dm_ar';

function p2(n){return String(n).padStart(2,'0');}
function todayKey(){const d=new Date();return `dm3-${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}

let items=[], nextId=1;
// 완료 항목 기본 닫힘
let doneCollapsed={routine:true, task:true};

// ── STORAGE ───────────────────────────────────────────────────────────────────
function saveState(){try{localStorage.setItem(todayKey(),JSON.stringify({items,nextId}));}catch(e){}}
function loadState(){
  try{
    const raw=localStorage.getItem(todayKey());
    if(raw){const d=JSON.parse(raw);items=d.items||[];nextId=d.nextId||1;return true;}
  }catch(e){}
  return false;
}
function loadDS(){try{return JSON.parse(localStorage.getItem(DS_KEY))||{sh:5,sm:0,eh:24,em:0};}catch{return{sh:5,sm:0,eh:24,em:0};}}
function saveDS(){
  const ds={sh:+document.getElementById('stSH').value,sm:+document.getElementById('stSM').value,
             eh:+document.getElementById('stEH').value,em:+document.getElementById('stEM').value};
  localStorage.setItem(DS_KEY,JSON.stringify(ds));
  updateDayGauge();updateSetPreview();
}
function loadAR(){try{return JSON.parse(localStorage.getItem(AR_KEY))||{enabled:false,h:5,m:0};}catch{return{enabled:false,h:5,m:0};}}
function saveAutoReset(){
  const ar={enabled:document.getElementById('arEnabled').checked,
             h:+document.getElementById('arH').value,m:+document.getElementById('arM').value};
  localStorage.setItem(AR_KEY,JSON.stringify(ar));
  document.getElementById('arTimeRow').style.display=ar.enabled?'flex':'none';
  document.getElementById('arPreview').textContent=ar.enabled?`매일 ${ar.h}시 ${p2(ar.m)}분에 자동 초기화됩니다.`:'';
}

// ── DATE ──────────────────────────────────────────────────────────────────────
const DAYS=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
function getWeekday(){return DAYS[new Date().getDay()];}
document.getElementById('dateEl').textContent=getWeekday();

// ── DAY GAUGE ─────────────────────────────────────────────────────────────────
function updateDayGauge(){
  const ds=loadDS();
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  const s0=ds.sh*60+ds.sm,e0=ds.eh*60+ds.em,rng=e0-s0;
  const elapsed=Math.max(0,Math.min(rng,nm-s0));
  const pct=Math.round(elapsed/rng*100);
  // 파랑 → 주황
  const t=pct/100;
  const r=Math.round(147+(251-147)*t),g=Math.round(197+(146-197)*t),b=Math.round(253+(30-253)*t);
  const fill=document.getElementById('dayFill');
  fill.style.width=pct+'%';
  fill.style.background=`linear-gradient(90deg,#93c5fd,rgb(${r},${g},${b}))`;
  const midM=Math.round((s0+e0)/2);
  document.getElementById('dlS').textContent=`${ds.sh}:${p2(ds.sm)}`;
  document.getElementById('dlM').textContent=`${Math.floor(midM/60)}:${p2(midM%60)}`;
  document.getElementById('dlE').textContent=`${ds.eh}:${p2(ds.em)}`;
  const remMin=Math.max(0,rng-elapsed),rh=Math.floor(remMin/60),rm=remMin%60;
  const remEl=document.getElementById('dayRem');
  remEl.textContent=nm<s0?`하루 시작까지 ${rh}h ${p2(rm)}m`:remMin===0?'오늘도 수고했어요':`${rh}h ${p2(rm)}m 남음`;
  remEl.style.color=pct>=80?`rgb(${r},${g},${b})`:'var(--accent)';
}
updateDayGauge();
setInterval(updateDayGauge,60000);

// ── AUTO RESET ────────────────────────────────────────────────────────────────
const AR_DONE_KEY='dm_ar_done';
function doReset(){
  // 루틴: 상태만 리셋
  items.forEach(t=>{if(t.type==='routine')t.status=STATUS.BEFORE;});
  // 할 일: 삭제
  items=items.filter(t=>t.type==='routine');
  saveState();renderAll();
}
setInterval(()=>{
  const ar=loadAR();if(!ar.enabled)return;
  const nm=new Date().getHours()*60+new Date().getMinutes();
  const arMin=ar.h*60+ar.m,mark=todayKey()+'_'+arMin;
  if(nm>=arMin&&localStorage.getItem(AR_DONE_KEY)!==mark){
    localStorage.setItem(AR_DONE_KEY,mark);
    doReset();toast('자동 초기화 완료','ok');
  }
},30000);

// DATE CHANGE
let currentDayKey=todayKey();
setInterval(()=>{
  const nk=todayKey();
  if(nk!==currentDayKey){
    currentDayKey=nk;
    document.getElementById('dateEl').textContent=getWeekday();
    doReset();
  }
},30000);

// ── PAGES ─────────────────────────────────────────────────────────────────────
const pgInner=document.getElementById('pgInner');
let curPg=0;
function goPage(i){
  curPg=i;pgInner.style.transform=`translateX(${-i*100}vw)`;
  document.querySelectorAll('.nav-btn').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.getElementById('btnReset').style.display=i===0?'':'none';
  if(i===1)renderSettings();
  window.scrollTo({top:0,behavior:'instant'});
}
let tx=0,sw=false;
const pgOuter=document.getElementById('pgOuter');
pgOuter.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;sw=false;},{passive:true});
pgOuter.addEventListener('touchmove',e=>{if(!sw&&Math.abs(e.touches[0].clientX-tx)>12)sw=true;if(sw)e.preventDefault();},{passive:false});
pgOuter.addEventListener('touchend',e=>{if(!sw)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)goPage(dx<0?Math.min(1,curPg+1):Math.max(0,curPg-1));});

// ── INLINE ADD ────────────────────────────────────────────────────────────────
function focusInlineAdd(type){
  document.getElementById(type+'AddInp').focus();
}
function submitInlineAdd(type){
  const inp=document.getElementById(type+'AddInp');
  const text=inp.value.trim();
  if(!text) return;
  const typeItems=items.filter(i=>i.type===type);
  const maxOrder=typeItems.length?Math.max(...typeItems.map(i=>i.order)):0;
  items.push({id:nextId++,text,type,status:STATUS.BEFORE,order:maxOrder+1});
  inp.value='';
  saveState();renderAll();
  // 추가 후 포커스 해제 → 회색 상태로 복귀
  inp.blur();
}
function blurInlineAdd(type){
  const inp=document.getElementById(type+'AddInp');
  const text=inp.value.trim();
  if(text) submitInlineAdd(type);
  else inp.value='';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){
  renderSection('routine','routineActive','routineDoneWrap','routineCount');
  renderSection('task','taskActive','taskDoneWrap','taskCount');
}

const COLORS = [
  {id:'none',   hex:null},
  {id:'blue',   hex:'#6aacf0'},
  {id:'orange', hex:'#fb923c'},
  {id:'purple', hex:'#b08ae0'},
];
function nextColor(current){
  const idx = COLORS.findIndex(c=>c.id===(current||'none'));
  return COLORS[(idx+1) % COLORS.length].id;
}
function getItemColor(item){
  const c = COLORS.find(c=>c.id===(item.color||'none'));
  return c ? c.hex : null;
}

function makeItem(item){
  const isDone=item.status===STATUS.DONE;
  const colorHex = getItemColor(item);
  const el=document.createElement('div');
  el.className='todo-item'+(isDone?' done':'');
  el.dataset.id=item.id;

  // 왼쪽 컬러바 — 탭하면 색상 순환
  const bar=document.createElement('div');
  bar.className='color-bar';
  bar.style.background = colorHex || 'var(--border-l)';
  bar.title='탭해서 색상 변경';
  bar.addEventListener('click', e=>{
    e.stopPropagation();
    item.color = nextColor(item.color);
    saveState(); renderAll();
  });

  const handle=document.createElement('div');handle.className='drag-handle';
  for(let i=0;i<3;i++){const s=document.createElement('span');handle.appendChild(s);}

  const chk=document.createElement('button');
  chk.className='chk-btn'+(isDone?' done':'');
  if(colorHex){
    chk.style.borderColor = colorHex;
    if(isDone) chk.style.background = colorHex;
  }
  chk.addEventListener('click',()=>{
    const nowDone = item.status!==STATUS.DONE;
    item.status=nowDone?STATUS.DONE:STATUS.BEFORE;
    if(nowDone) doneCollapsed[item.type]=true;
    saveState();renderAll();
  });

  const text=document.createElement('span');text.className='todo-text';text.textContent=item.text;

  const del=document.createElement('button');del.className='btn-del';del.textContent='✕';
  del.addEventListener('click',()=>{items=items.filter(i=>i.id!==item.id);saveState();renderAll();});

  el.appendChild(bar);el.appendChild(handle);el.appendChild(chk);el.appendChild(text);el.appendChild(del);
  return el;
}

function renderSection(type,activeId,doneWrapId,countId){
  const activeEl=document.getElementById(activeId);
  const doneWrap=document.getElementById(doneWrapId);
  activeEl.innerHTML='';doneWrap.innerHTML='';

  const all=[...items.filter(i=>i.type===type)].sort((a,b)=>a.order-b.order);
  const active=all.filter(i=>i.status!==STATUS.DONE);
  const done=all.filter(i=>i.status===STATUS.DONE);

  document.getElementById(countId).textContent=
    all.length?`${done.length}/${all.length}`:'';

  if(!all.length){
    return;
  }

  // 미완료
  active.forEach(item=>{
    const el=makeItem(item);
    activeEl.appendChild(el);
    setupDrag(el,el.querySelector('.drag-handle'),type);
  });

  // 완료 항목 접기
  if(done.length){
    const collapsed=doneCollapsed[type];
    const tog=document.createElement('div');
    tog.className='done-toggle'+(collapsed?'':' open');
    tog.innerHTML=`<i class="ic">›</i><span>완료 ${done.length}개 ${collapsed?'보기':'숨기기'}</span>`;
    tog.addEventListener('click',()=>{
      doneCollapsed[type]=!doneCollapsed[type];
      renderAll();
    });
    doneWrap.appendChild(tog);

    if(!collapsed){
      const doneList=document.createElement('div');doneList.className='done-list';
      done.forEach(item=>{
        const el=makeItem(item);
        doneList.appendChild(el);
        setupDrag(el,el.querySelector('.drag-handle'),type);
      });
      doneWrap.appendChild(doneList);
    }
  }
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
let dragEl=null,dragId=null,dragType=null,dragStartY=0;
let placeholder=null,dragContainer=null;

function setupDrag(el,handle,type){
  handle.addEventListener('touchstart',e=>{e.stopPropagation();startDrag(el,type,e.touches[0].clientY);},{passive:true});
  handle.addEventListener('mousedown',e=>{e.preventDefault();startDrag(el,type,e.clientY);});
}
function startDrag(el,type,clientY){
  dragEl=el;dragId=+el.dataset.id;dragType=type;dragStartY=clientY;
  // 드래그는 미완료 목록에서만
  dragContainer=type==='routine'?document.getElementById('routineActive'):document.getElementById('taskActive');
  dragEl.classList.add('dragging');
  placeholder=document.createElement('div');
  placeholder.style.cssText=`height:${dragEl.offsetHeight}px;border-radius:12px;background:var(--accent-l);border:1.5px dashed var(--accent-b);`;
  dragContainer.insertBefore(placeholder,dragEl.nextSibling);
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd);
  document.addEventListener('mousemove',onDragMoveM);
  document.addEventListener('mouseup',onDragEnd);
}
function onDragMove(e){e.preventDefault();moveDrag(e.touches[0].clientY);}
function onDragMoveM(e){moveDrag(e.clientY);}
function moveDrag(clientY){
  if(!dragEl)return;
  dragEl.style.transform=`translateY(${clientY-dragStartY}px)`;
  dragEl.style.zIndex='300';dragEl.style.position='relative';
  const sibs=[...dragContainer.children].filter(c=>c!==dragEl&&c!==placeholder);
  let ins=null;
  for(const s of sibs){const r=s.getBoundingClientRect();if(clientY<r.top+r.height/2){ins=s;break;}}
  if(ins)dragContainer.insertBefore(placeholder,ins);else dragContainer.appendChild(placeholder);
}
function onDragEnd(){
  if(!dragEl)return;
  dragEl.style.transform='';dragEl.style.zIndex='';dragEl.style.position='';
  dragEl.classList.remove('dragging');
  const allCh=[...dragContainer.children];
  const phIdx=allCh.indexOf(placeholder);
  const before=allCh.slice(0,phIdx).filter(c=>c!==dragEl&&c!==placeholder).map(c=>+c.dataset.id);
  const after=allCh.slice(phIdx+1).filter(c=>c!==dragEl&&c!==placeholder).map(c=>+c.dataset.id);
  const newOrder=[...before,dragId,...after];
  newOrder.forEach((id,idx)=>{const item=items.find(i=>i.id===id);if(item)item.order=idx+1;});
  placeholder.remove();placeholder=null;dragEl=null;dragId=null;dragType=null;
  document.removeEventListener('touchmove',onDragMove);document.removeEventListener('touchend',onDragEnd);
  document.removeEventListener('mousemove',onDragMoveM);document.removeEventListener('mouseup',onDragEnd);
  saveState();renderAll();
}

// ── RESET ─────────────────────────────────────────────────────────────────────
document.getElementById('btnReset').addEventListener('click',()=>{
  showConfirm('초기화할까요?\n루틴은 상태만 리셋되고\n할 일은 삭제됩니다.',()=>{
    if(!items.length){
      DEFAULT_ROUTINES.forEach((text,i)=>{items.push({id:nextId++,text,type:'routine',status:STATUS.BEFORE,order:i+1});});
    } else {
      doReset();
    }
    toast('초기화 완료','ok');
  });
});

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function renderSettings(){
  const ds=loadDS(),ar=loadAR();
  const stSH=document.getElementById('stSH'),stSM=document.getElementById('stSM');
  const stEH=document.getElementById('stEH'),stEM=document.getElementById('stEM');
  const arH=document.getElementById('arH'),arM=document.getElementById('arM');
  if(!stSH.options.length){
    for(let i=0;i<=24;i++){[stSH,stEH,arH].forEach(s=>{const o=document.createElement('option');o.value=i;o.textContent=i+'시';s.appendChild(o);});}
    [0,10,20,30,40,50].forEach(m=>{[stSM,stEM,arM].forEach(s=>{const o=document.createElement('option');o.value=m;o.textContent=p2(m)+'분';s.appendChild(o);});});
    [stSH,stSM,stEH,stEM].forEach(s=>s.addEventListener('change',saveDS));
  }
  stSH.value=ds.sh;stSM.value=ds.sm;stEH.value=ds.eh;stEM.value=ds.em;
  arH.value=ar.h;arM.value=ar.m;
  document.getElementById('arEnabled').checked=ar.enabled;
  document.getElementById('arTimeRow').style.display=ar.enabled?'flex':'none';
  document.getElementById('arPreview').textContent=ar.enabled?`매일 ${ar.h}시 ${p2(ar.m)}분에 자동 초기화됩니다.`:'';
  updateSetPreview();highlightPreset(ds);
}
function updateSetPreview(){
  const ds=loadDS();
  const s0=ds.sh*60+ds.sm,e0=ds.eh*60+ds.em,tot=e0-s0;
  const h=Math.floor(tot/60),m=tot%60;
  document.getElementById('setPreview').textContent=
    `${ds.sh}:${p2(ds.sm)} → ${ds.eh}:${p2(ds.em)}  (총 ${h?h+'시간 ':''}${m?m+'분':''}을 하루로 설정)`;
  highlightPreset(ds);
}
const PRESETS=[{sh:5,sm:0,eh:24,em:0},{sh:6,sm:0,eh:22,em:0},{sh:5,sm:0,eh:17,em:0},{sh:9,sm:0,eh:21,em:0}];
function highlightPreset(ds){
  document.querySelectorAll('.btn-preset').forEach((btn,i)=>{
    const p=PRESETS[i];btn.classList.toggle('active',p&&p.sh===ds.sh&&p.sm===ds.sm&&p.eh===ds.eh&&p.em===ds.em);
  });
}
function applyPreset(sh,sm,eh,em,label){
  localStorage.setItem(DS_KEY,JSON.stringify({sh,sm,eh,em}));
  renderSettings();updateDayGauge();toast(`${label} 프리셋 적용`,'ok');
}

// ── CONFIRM & TOAST ───────────────────────────────────────────────────────────
function showConfirm(msg,onOk){
  document.getElementById('cfmMsg').textContent=msg;
  document.getElementById('cfmBd').classList.add('open');
  const ok=document.getElementById('cfmOk'),cancel=document.getElementById('cfmCancel');
  const close=()=>{document.getElementById('cfmBd').classList.remove('open');ok.onclick=null;cancel.onclick=null;};
  ok.onclick=()=>{close();onOk();};cancel.onclick=close;
}
let toastTimer=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=type==='ok'?'#16a34a':type==='err'?'#f08080':'#1a1a18';
  el.style.display='block';clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display='none';},2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if(!loadState()){
  DEFAULT_ROUTINES.forEach((text,i)=>{
    items.push({id:nextId++,text,type:'routine',status:STATUS.BEFORE,order:i+1});
  });
}
renderAll();
</script>
</body>
</html>
